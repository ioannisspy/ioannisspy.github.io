<script>
  // Deter casual downloading of images. This is not a security control:
  // images shown in a browser are always downloaded to render, so screenshots,
  // devtools, and the network tab still work. This only blocks the easy paths.
  (function () {
    document.addEventListener('contextmenu', function (e) {
      if (e.target && e.target.tagName === 'IMG') e.preventDefault();
    });
    document.addEventListener('dragstart', function (e) {
      if (e.target && e.target.tagName === 'IMG') e.preventDefault();
    });
  })();
</script>
